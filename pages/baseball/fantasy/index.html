<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fantasy — Coherency Baseball</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="scanlines" aria-hidden="true"></div>

  <nav class="nav">
    <a href="/" class="nav-logo">coherency</a>
    <div class="nav-links">
      <a href="/baseball/" class="nav-link">baseball</a>
    </div>
  </nav>

  <main class="fantasy-dashboard">

    <!-- TOP BAR -->
    <header class="dash-topbar">
      <div class="dash-title-block">
        <span class="dash-title-text">FANTASY_MATRIX</span>
        <span class="dash-date" id="dashDate"></span>
      </div>
      <div class="scoring-toggle" role="group" aria-label="Scoring system">
        <button class="scoring-btn active" data-scoring="espn">[ESPN]</button>
        <button class="scoring-btn" data-scoring="yahoo">[YAHOO]</button>
        <button class="scoring-btn" data-scoring="fangraphs">[FG]</button>
      </div>
      <div class="dash-status" id="dashStatus">LOADING</div>
    </header>

    <!-- POSITION FILTER RAIL -->
    <nav class="pos-filter-rail" aria-label="Position filter">
      <button class="pos-btn active" data-pos="ALL">ALL</button>
      <button class="pos-btn" data-pos="HIT">HIT</button>
      <span class="pos-sep">—</span>
      <button class="pos-btn" data-pos="SP">SP</button>
      <button class="pos-btn" data-pos="RP">RP</button>
      <span class="pos-sep">—</span>
      <button class="pos-btn" data-pos="C">C</button>
      <button class="pos-btn" data-pos="1B">1B</button>
      <button class="pos-btn" data-pos="2B">2B</button>
      <button class="pos-btn" data-pos="3B">3B</button>
      <button class="pos-btn" data-pos="SS">SS</button>
      <button class="pos-btn" data-pos="IF">IF</button>
      <button class="pos-btn" data-pos="OF">OF</button>
      <button class="pos-btn" data-pos="DH">DH</button>
    </nav>

    <!-- HERO PAIR (2 cards always; 3rd appears when specific position active) -->
    <section class="hero-pair" id="heroPair">
      <div class="hero-slot" id="heroCard"></div>
      <div class="hero-slot" id="heroHitterCard"></div>
      <div class="hero-slot hero-pos-slot" id="heroPosCard" style="display:none"></div>
    </section>

    <!-- STAT MATRIX -->
    <section class="matrix-section">
      <div class="matrix-header">
        <span class="matrix-label">// STAT_MATRIX</span>
        <span class="matrix-count" id="matrixCount"></span>
      </div>
      <div class="matrix-wrap">
        <table class="stat-matrix" id="statMatrix">
          <thead id="matrixHead"></thead>
          <tbody id="matrixBody"></tbody>
        </table>
      </div>
    </section>

  </main>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay" aria-hidden="true" role="dialog">
    <div class="modal-panel" id="modalPanel">
      <button class="modal-close" id="modalClose" aria-label="Close">[×]</button>
      <div class="modal-header-label">// PLAYER_DETAIL</div>
      <div class="modal-photo-row">
        <img class="modal-photo" id="modalPhoto" alt="">
        <div class="modal-name-block">
          <div class="modal-name" id="modalName"></div>
          <div class="modal-team-pos" id="modalTeamPos"></div>
          <div class="modal-score-row">
            <span class="modal-pts-label" id="modalPtsLabel">TODAY</span>
            <span class="modal-pts-value" id="modalPts"></span>
            <span class="modal-pts-unit">PTS</span>
          </div>
        </div>
      </div>
      <div class="modal-breakdown" id="modalBreakdown"></div>
      <div class="modal-ranks" id="modalRanks"></div>
      <div class="modal-history-tabs" id="modalHistTabs">
        <button class="hist-tab active" data-window="7">[L7]</button>
        <button class="hist-tab" data-window="15">[L15]</button>
        <button class="hist-tab" data-window="30">[L30]</button>
      </div>
      <div class="modal-history-body" id="modalHistBody">
        <div class="hist-loading">Loading history...</div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
