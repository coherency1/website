<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matchups — Diamond Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="scanlines" aria-hidden="true"></div>

  <nav class="nav">
    <a href="/" class="nav-logo">coherency</a>
    <div class="nav-links">
      <a href="/baseball/" class="nav-link">baseball</a>
    </div>
  </nav>

  <main class="matchups-dash">

    <header class="dash-topbar">
      <div class="dash-title-block">
        <span class="dash-title-text">DIAMOND_ENGINE</span>
        <span class="dash-subtitle">MATCHUP RATINGS</span>
      </div>
      <div class="dash-meta">
        <span class="dash-date" id="dashDate"></span>
        <span class="dash-sim-count" id="simCount"></span>
      </div>
      <div class="dash-status" id="dashStatus">LOADING</div>
    </header>

    <section class="games-grid" id="gamesGrid">
      <!-- Game cards rendered by JS -->
    </section>

    <div class="empty-state" id="emptyState" hidden>
      <span class="empty-icon">//</span>
      <span class="empty-text">NO SIMULATION DATA</span>
      <span class="empty-sub">Run the daily pipeline to generate matchup ratings.</span>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
