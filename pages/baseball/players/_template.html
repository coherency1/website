<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Coherency — PLAYER_NAME stats.">
    <title>PLAYER_NAME — Coherency Baseball</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
</head>
<body>

    <div class="scanlines" aria-hidden="true"></div>
    <canvas id="starsCanvas" class="stars-canvas" aria-hidden="true"></canvas>

    <nav class="nav" id="nav">
        <a href="../../../index.html" class="nav-logo">coherency</a>
        <div class="nav-links">
            <a href="../index.html">scoreboard</a>
        </div>
    </nav>

    <section class="hero">
        <div class="player-card">
            <div class="card-header">
                <span class="card-number">##</span>
                <div class="card-name-block">
                    <span class="card-player-name">PLAYER NAME</span>
                    <span class="card-position">POSITION</span>
                </div>
            </div>

            <!-- BATTING STATS -->
            <div class="card-stats">
                <div class="stat-cell">
                    <span class="stat-label">AVG</span>
                    <span class="stat-value">.000</span>
                </div>
                <div class="stat-cell">
                    <span class="stat-label">OBP</span>
                    <span class="stat-value">.000</span>
                </div>
                <div class="stat-cell">
                    <span class="stat-label">SLG</span>
                    <span class="stat-value">.000</span>
                </div>
                <div class="stat-cell">
                    <span class="stat-label">OPS</span>
                    <span class="stat-value">.000</span>
                </div>
            </div>

            <div class="card-details">
                BATS: X / THROWS: X<br>
                HT: X'X" / WT: XXX lbs<br>
                AGE: XX
            </div>

            <a href="../index.html" class="card-back-link">← BACK TO SCOREBOARD</a>
        </div>
    </section>

    <footer class="footer">
        <span class="footer-copy">&copy; 2026 Corey Chen</span>
        <div class="footer-links">
            <a href="../index.html">Scoreboard</a>
        </div>
    </footer>

    <script>
    // Minimal star field for player pages
    (function() {
        const canvas = document.getElementById('starsCanvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        const w = window.innerWidth;
        const h = window.innerHeight;
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.imageSmoothingEnabled = false;
        for (let i = 0; i < 80; i++) {
            const brightness = 0.2 + Math.random() * 0.5;
            ctx.fillStyle = `rgba(200, 210, 230, ${brightness})`;
            ctx.fillRect(
                Math.floor(Math.random() * w),
                Math.floor(Math.random() * h),
                Math.random() < 0.3 ? 2 : 1,
                Math.random() < 0.3 ? 2 : 1
            );
        }
        const nav = document.getElementById('nav');
        if (nav) window.addEventListener('scroll', () => {
            nav.classList.toggle('scrolled', window.scrollY > 40);
        }, { passive: true });
    })();
    </script>
</body>
</html>
