<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Coherency — cool builds and shit.">
    <title>Coherency</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Aurora background layer -->
    <canvas class="aurora-canvas" id="auroraCanvas" aria-hidden="true"></canvas>
    <div class="aurora-stars" aria-hidden="true"></div>

    <!-- Nav -->
    <nav class="nav" id="nav">
        <a href="/" class="nav-logo">coherency</a>
        <div class="nav-links">
            <a href="https://github.com/coherency1" target="_blank" rel="noopener">github</a>
            <a href="/baseball">baseball</a>
            <a href="https://thecoherency.substack.com" target="_blank" rel="noopener">articles</a>
        </div>
    </nav>

    <!-- Hero -->
    <section class="hero">
        <div class="hero-text">
            <p class="hero-eyebrow">Corey Chen</p>
            <h1 class="hero-name">COHERENCY</h1>
            <p class="hero-desc">cool builds and shit.</p>
        </div>
        <div class="scroll-hint" aria-hidden="true">
            <span class="scroll-line"></span>
        </div>
    </section>

    <!-- Work -->
    <section class="work" id="work">
        <div class="section-header">
            <span class="section-label">Projects</span>
            <span class="section-line"></span>
        </div>
        <div class="repo-grid" id="repoGrid">
            <div class="repo-loading">fetching repos...</div>
        </div>
        <a href="https://github.com/coherency1" target="_blank" rel="noopener" class="all-repos-link">view all repos</a>
    </section>

    <!-- About -->
    <section class="about">
        <p class="about-text">
            <span class="about-muted">I build tools, systems, and interfaces — </span>
            <span class="about-bright">shipping ideas into reality as fast as possible.</span>
        </p>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <span class="footer-copy">&copy; 2026 Corey Chen</span>
        <div class="footer-links">
            <a href="https://github.com/coherency1" target="_blank" rel="noopener">GitHub</a>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
